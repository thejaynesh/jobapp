<div id="experience-list">
  {% for exp in profile.experience %}
  <div data-id="{{ exp.id }}" class="border border-gray-200 rounded p-4 mb-3 bg-white">
    <details {% if not exp.company %}open{% endif %}>
      <summary class="cursor-pointer font-medium text-gray-700">
        {{ exp.company or "New Experience" }}{% if exp.role %} — {{ exp.role }}{% endif %}
        {% if saved_id is defined and saved_id == exp.id %}<span class="text-green-600 text-xs ml-2 success-flash">Saved.</span>{% endif %}
      </summary>
      <form hx-post="/profile/experience/{{ exp.id }}" hx-target="#experience-list" hx-swap="outerHTML" class="mt-3 space-y-3">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs text-gray-500">Company</label>
            <input type="text" name="company" value="{{ exp.company }}" class="mt-1 w-full border border-gray-300 rounded px-2 py-1 text-sm">
          </div>
          <div>
            <label class="block text-xs text-gray-500">Role</label>
            <input type="text" name="role" value="{{ exp.role }}" class="mt-1 w-full border border-gray-300 rounded px-2 py-1 text-sm">
          </div>
          <div>
            <label class="block text-xs text-gray-500">Start Date (YYYY-MM)</label>
            <input type="text" name="start_date" value="{{ exp.start_date }}" class="mt-1 w-full border border-gray-300 rounded px-2 py-1 text-sm">
          </div>
          <div>
            <label class="block text-xs text-gray-500">End Date</label>
            <input type="text" name="end_date" value="{{ exp.end_date }}" class="mt-1 w-full border border-gray-300 rounded px-2 py-1 text-sm">
          </div>
        </div>
        <div>
          <label class="block text-xs text-gray-500">Tech (comma-separated)</label>
          <input type="text" name="tech" value="{{ exp.tech | join(', ') }}" class="mt-1 w-full border border-gray-300 rounded px-2 py-1 text-sm">
        </div>
        <div>
          <label class="block text-xs text-gray-500">Bullets (one per line)</label>
          <textarea name="bullets" rows="4" class="mt-1 w-full border border-gray-300 rounded px-2 py-1 text-sm">{{ exp.bullets | join('\n') }}</textarea>
        </div>
        <div class="flex gap-2">
          <button type="submit" class="bg-blue-600 text-white px-3 py-1 rounded text-sm hover:bg-blue-700">Save</button>
          <button type="button" hx-delete="/profile/experience/{{ exp.id }}" hx-target="#experience-list" hx-swap="outerHTML" hx-confirm="Delete?" class="text-red-500 text-sm hover:underline">Delete</button>
        </div>
      </form>
    </details>
  </div>
  {% endfor %}
  <button hx-post="/profile/experience/add" hx-target="#experience-list" hx-swap="outerHTML" class="mt-2 text-blue-600 text-sm hover:underline">+ Add Experience</button>
</div>
