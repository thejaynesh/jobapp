<div class="border border-gray-100 rounded p-4 bg-white" id="answer-{{ index }}">
  <p class="text-sm font-medium text-gray-700 mb-2">{{ index + 1 }}. {{ item.question }}</p>
  <form hx-post="/profile/narrative/answer/{{ index }}"
        hx-target="#answer-{{ index }}" hx-swap="outerHTML">
    {% if saved %}
    <p class="text-green-600 text-xs mb-1 success-flash">Saved.</p>
    {% endif %}
    <textarea name="answer" rows="3"
              class="w-full border border-gray-200 rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-300">{{ item.answer }}</textarea>
    <button type="submit" class="mt-2 text-xs text-blue-600 hover:underline">Save answer</button>
  </form>
</div>
