<div id="projects-list">
  {% for proj in profile.projects %}
  <div data-id="{{ proj.id }}" class="border border-gray-200 rounded p-4 mb-3 bg-white">
    <details {% if not proj.name %}open{% endif %}>
      <summary class="cursor-pointer font-medium text-gray-700">
        {{ proj.name or "New Project" }}
        {% if saved_id is defined and saved_id == proj.id %}<span class="text-green-600 text-xs ml-2 success-flash">Saved.</span>{% endif %}
      </summary>
      <form hx-post="/profile/projects/{{ proj.id }}" hx-target="#projects-list" hx-swap="outerHTML" class="mt-3 space-y-3">
        <div>
          <label class="block text-xs text-gray-500">Project Name</label>
          <input type="text" name="name" value="{{ proj.name }}" class="mt-1 w-full border border-gray-300 rounded px-2 py-1 text-sm">
        </div>
        <div>
          <label class="block text-xs text-gray-500">Description</label>
          <textarea name="description" rows="2" class="mt-1 w-full border border-gray-300 rounded px-2 py-1 text-sm">{{ proj.description }}</textarea>
        </div>
        <div>
          <label class="block text-xs text-gray-500">Tech (comma-separated)</label>
          <input type="text" name="tech" value="{{ proj.tech | join(', ') }}" class="mt-1 w-full border border-gray-300 rounded px-2 py-1 text-sm">
        </div>
        <div>
          <label class="block text-xs text-gray-500">Bullets (one per line)</label>
          <textarea name="bullets" rows="3" class="mt-1 w-full border border-gray-300 rounded px-2 py-1 text-sm">{{ proj.bullets | join('\n') }}</textarea>
        </div>
        <div>
          <label class="block text-xs text-gray-500">URL</label>
          <input type="text" name="url" value="{{ proj.url }}" class="mt-1 w-full border border-gray-300 rounded px-2 py-1 text-sm">
        </div>
        <div class="flex gap-2">
          <button type="submit" class="bg-blue-600 text-white px-3 py-1 rounded text-sm hover:bg-blue-700">Save</button>
          <button type="button" hx-delete="/profile/projects/{{ proj.id }}" hx-target="#projects-list" hx-swap="outerHTML" hx-confirm="Delete?" class="text-red-500 text-sm hover:underline">Delete</button>
        </div>
      </form>
    </details>
  </div>
  {% endfor %}
  <button hx-post="/profile/projects/add" hx-target="#projects-list" hx-swap="outerHTML" class="mt-2 text-blue-600 text-sm hover:underline">+ Add Project</button>
</div>
