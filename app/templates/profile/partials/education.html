<div id="education-list">
  {% for edu in profile.education %}
  <div data-id="{{ edu.id }}" class="border border-gray-200 rounded p-4 mb-3 bg-white">
    <details {% if not edu.school %}open{% endif %}>
      <summary class="cursor-pointer font-medium text-gray-700">
        {{ edu.school or "New Education" }}{% if edu.degree %} — {{ edu.degree }}{% endif %}
        {% if saved_id is defined and saved_id == edu.id %}<span class="text-green-600 text-xs ml-2 success-flash">Saved.</span>{% endif %}
      </summary>
      <form hx-post="/profile/education/{{ edu.id }}" hx-target="#education-list" hx-swap="outerHTML" class="mt-3 space-y-3">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs text-gray-500">School</label>
            <input type="text" name="school" value="{{ edu.school }}" class="mt-1 w-full border border-gray-300 rounded px-2 py-1 text-sm">
          </div>
          <div>
            <label class="block text-xs text-gray-500">Degree</label>
            <input type="text" name="degree" value="{{ edu.degree }}" class="mt-1 w-full border border-gray-300 rounded px-2 py-1 text-sm">
          </div>
          <div>
            <label class="block text-xs text-gray-500">Start Date</label>
            <input type="text" name="start_date" value="{{ edu.start_date }}" class="mt-1 w-full border border-gray-300 rounded px-2 py-1 text-sm">
          </div>
          <div>
            <label class="block text-xs text-gray-500">End Date</label>
            <input type="text" name="end_date" value="{{ edu.end_date }}" class="mt-1 w-full border border-gray-300 rounded px-2 py-1 text-sm">
          </div>
          <div>
            <label class="block text-xs text-gray-500">GPA</label>
            <input type="text" name="gpa" value="{{ edu.gpa }}" class="mt-1 w-full border border-gray-300 rounded px-2 py-1 text-sm">
          </div>
        </div>
        <div class="flex gap-2">
          <button type="submit" class="bg-blue-600 text-white px-3 py-1 rounded text-sm hover:bg-blue-700">Save</button>
          <button type="button" hx-delete="/profile/education/{{ edu.id }}" hx-target="#education-list" hx-swap="outerHTML" hx-confirm="Delete?" class="text-red-500 text-sm hover:underline">Delete</button>
        </div>
      </form>
    </details>
  </div>
  {% endfor %}
  <button hx-post="/profile/education/add" hx-target="#education-list" hx-swap="outerHTML" class="mt-2 text-blue-600 text-sm hover:underline">+ Add Education</button>
</div>
