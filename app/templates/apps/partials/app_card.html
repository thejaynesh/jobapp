<div id="app-card-{{ app.id }}" class="bg-white border border-gray-200 rounded-lg p-4 shadow-sm">
  <div class="flex justify-between items-start gap-2">
    <div class="min-w-0">
      <a href="/apps/{{ app.id }}" class="text-blue-600 font-medium hover:underline block break-words leading-snug">
        {{ app.job.title }}
      </a>
      <p class="text-sm text-gray-500 mt-0.5 break-words">{{ app.job.company }}</p>
    </div>
    <span class="text-xs text-gray-400 shrink-0 mt-0.5">
      {% if app.documents %}{{ app.documents | length }} doc(s){% endif %}
    </span>
  </div>
  <div class="flex flex-wrap items-center gap-2 mt-3">
    <select
      hx-post="/apps/{{ app.id }}/status"
      hx-target="#app-card-{{ app.id }}"
      hx-swap="outerHTML"
      name="status"
      class="border border-gray-300 rounded px-2 py-1 text-xs focus:outline-none focus:ring-1 focus:ring-blue-500">
      {% for s in ['not_applied', 'applied', 'interviewing', 'offered', 'rejected', 'withdrawn'] %}
        <option value="{{ s }}" {% if app.status.value == s %}selected{% endif %}>
          {{ s | replace("_", " ") | title }}
        </option>
      {% endfor %}
    </select>
    {% if app.applied_at %}
    <span class="text-xs text-gray-400">{{ app.applied_at.strftime('%b %d') }}</span>
    {% endif %}
  </div>
</div>
